<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copysight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Sans+Condensed:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="window">

  <!-- ════════════════════════════════════
       SCREEN 1+2: INPUT DESK + STAMPING
       ════════════════════════════════════ -->
  <div id="screen-input" class="screen active">

    <!-- Watercolor gear stains -->
    <div class="watercolor-gears">
      <svg class="wg-r1" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <path d="M66,18 L66,8 L76,8 L76,18 C81,18.6 85.5,20.5 89.5,23 L96,16 L104,24 L97,31 C99.5,35 101.3,39.5 102,44 L112,44 L112,54 L102,54 C101.3,58.5 99.5,63 97,67 L104,74 L96,82 L89.5,75 C85.5,77.5 81,79.4 76,80 L76,90 L66,90 L66,80 C61,79.4 56.5,77.5 52.5,75 L46,82 L38,74 L45,67 C42.5,63 40.7,58.5 40,54 L30,54 L30,44 L40,44 C40.7,39.5 42.5,35 45,31 L38,24 L46,16 L52.5,23 C56.5,20.5 61,18.6 66,18 Z M71,34 A17,17 0 1,0 71,66 A17,17 0 1,0 71,34 Z"/>
      </svg>
      <svg class="wg-r2" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M28,8 L28,3 L34,3 L34,8 C36.5,8.3 38.8,9.2 40.7,10.5 L44,7 L49,12 L45.7,15.3 C47,17.2 47.8,19.5 48.1,22 L53,22 L53,28 L48.1,28 C47.8,30.5 47,32.8 45.7,34.7 L49,38 L44,43 L40.7,39.5 C38.8,40.8 36.5,41.7 34,42 L34,47 L28,47 L28,42 C25.5,41.7 23.2,40.8 21.3,39.5 L18,43 L13,38 L16.3,34.7 C15,32.8 14.2,30.5 13.9,28 L9,28 L9,22 L13.9,22 C14.2,19.5 15,17.2 16.3,15.3 L13,12 L18,7 L21.3,10.5 C23.2,9.2 25.5,8.3 28,8 Z M31,18 A8,8 0 1,0 31,34 A8,8 0 1,0 31,18 Z"/>
      </svg>
      <svg class="wg-l1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M46,14 L46,6 L54,6 L54,14 C58,14.4 61.5,16 64.5,18 L70,12 L76,18 L70,24 C72,27 73.5,30.5 74,34 L82,34 L82,42 L74,42 C73.5,45.5 72,49 70,52 L76,58 L70,64 L64.5,58 C61.5,60 58,61.5 54,62 L54,70 L46,70 L46,62 C42,61.5 38.5,60 35.5,58 L30,64 L24,58 L30,52 C28,49 26.5,45.5 26,42 L18,42 L18,34 L26,34 C26.5,30.5 28,27 30,24 L24,18 L30,12 L35.5,18 C38.5,16 42,14.4 46,14 Z M50,28 A10,10 0 1,0 50,48 A10,10 0 1,0 50,28 Z"/>
      </svg>
    </div>

    <div class="input-content">
      <h1 class="brand-title">COPYSIGHT</h1>
      <p class="brand-tagline" id="brandTagline">From video to insights — one click</p>
      <div class="input-row">
        <input type="url" class="url-slot" id="urlInput"
          placeholder="" autocomplete="off" spellcheck="false">
        <button class="nipple-btn" id="goBtn" aria-label="Process video"></button>
      </div>
      <div class="stamp-area" id="stampArea"></div>
    </div>

    <!-- Sound wave icon -->
    <div class="sound-wave" id="soundWave">
      <div class="sound-wave-bar"></div>
      <div class="sound-wave-bar"></div>
      <div class="sound-wave-bar"></div>
      <div class="sound-wave-bar"></div>
      <div class="sound-wave-bar"></div>
    </div>

    <!-- Nav hint: left -> Library -->
    <div class="nav-hint nav-left" data-target="library">
      <span class="nav-hint-arrow">&#x2039;</span>
      <span class="nav-hint-label">Library</span>
    </div>

    <!-- Settings gear -->
    <div class="settings-trigger" id="settingsTrigger">&#9881;</div>
  </div>


  <!-- ════════════════════════════════════
       SCREEN 3: READER
       ════════════════════════════════════ -->
  <div id="screen-reader" class="screen">

    <!-- Faint watercolor gears -->
    <div class="watercolor-gears">
      <svg class="wg-r1" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <path d="M66,18 L66,8 L76,8 L76,18 C81,18.6 85.5,20.5 89.5,23 L96,16 L104,24 L97,31 C99.5,35 101.3,39.5 102,44 L112,44 L112,54 L102,54 C101.3,58.5 99.5,63 97,67 L104,74 L96,82 L89.5,75 C85.5,77.5 81,79.4 76,80 L76,90 L66,90 L66,80 C61,79.4 56.5,77.5 52.5,75 L46,82 L38,74 L45,67 C42.5,63 40.7,58.5 40,54 L30,54 L30,44 L40,44 C40.7,39.5 42.5,35 45,31 L38,24 L46,16 L52.5,23 C56.5,20.5 61,18.6 66,18 Z M71,34 A17,17 0 1,0 71,66 A17,17 0 1,0 71,34 Z"/>
      </svg>
      <svg class="wg-r2" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M28,8 L28,3 L34,3 L34,8 C36.5,8.3 38.8,9.2 40.7,10.5 L44,7 L49,12 L45.7,15.3 C47,17.2 47.8,19.5 48.1,22 L53,22 L53,28 L48.1,28 C47.8,30.5 47,32.8 45.7,34.7 L49,38 L44,43 L40.7,39.5 C38.8,40.8 36.5,41.7 34,42 L34,47 L28,47 L28,42 C25.5,41.7 23.2,40.8 21.3,39.5 L18,43 L13,38 L16.3,34.7 C15,32.8 14.2,30.5 13.9,28 L9,28 L9,22 L13.9,22 C14.2,19.5 15,17.2 16.3,15.3 L13,12 L18,7 L21.3,10.5 C23.2,9.2 25.5,8.3 28,8 Z M31,18 A8,8 0 1,0 31,34 A8,8 0 1,0 31,18 Z"/>
      </svg>
    </div>

    <!-- Nav hint: left -> Library -->
    <div class="nav-hint nav-left" data-target="library">
      <span class="nav-hint-arrow">&#x2039;</span>
      <span class="nav-hint-label">Library</span>
    </div>

    <!-- Top-right action buttons -->
    <div class="reader-toolbar" id="readerToolbar">
      <button id="copyBtn" title="Copy as markdown">Copy</button>
      <button id="exportBtn" title="Export .txt">Export</button>
    </div>

    <div class="reader-content">
      <div class="date-stamp"><span id="dateStamp"></span></div>
      <article class="article" id="readerArticle">
        <!-- Populated by JS from pipeline result -->
      </article>
    </div>

    <div class="reader-actions">
      <button id="newBtn">&#x2190; New</button>
    </div>
  </div>


  <!-- ════════════════════════════════════
       SCREEN 4: LIBRARY
       ════════════════════════════════════ -->
  <div id="screen-library" class="screen">

    <!-- Nav hint: right -> Reader -->
    <div class="nav-hint nav-right" data-target="reader">
      <span class="nav-hint-arrow">&#x203A;</span>
      <span class="nav-hint-label">Reader</span>
    </div>

    <div class="main-layout">
      <nav class="sidebar">
        <div class="tab tab-fresh active" data-bracket="fresh"><span>Fresh</span></div>
        <div class="tab tab-recent" data-bracket="recent"><span>Recent</span></div>
        <div class="tab tab-settled" data-bracket="settled"><span>Settled</span></div>
        <div class="tab tab-gold" data-bracket="gold"><span>Gold</span></div>
      </nav>

      <div class="content-area">
        <input type="text" class="search-bar" id="searchBar" placeholder="Search...">
        <div class="file-list" id="fileList">
          <!-- Populated by JS from Python API -->
        </div>
      </div>
    </div>
  </div>


  <!-- ════════════════════════════════════
       SETTINGS OVERLAY
       ════════════════════════════════════ -->
  <div id="settingsOverlay" class="settings-overlay hidden">
    <div class="settings-panel" id="settingsPanel">
      <h3>Settings</h3>

      <label for="apiKeyInput">OPENROUTER API KEY</label>
      <input type="password" id="apiKeyInput" placeholder="sk-or-..." autocomplete="off">
      <div class="settings-status" id="apiKeyStatus"></div>

      <label for="langSelect">LANGUAGE</label>
      <select id="langSelect">
        <option value="auto">Auto</option>
        <option value="pl">Polski</option>
        <option value="en">English</option>
      </select>

      <label for="modelSelect">MODEL</label>
      <select id="modelSelect">
        <option value="turbo">Turbo (rekomendowany)</option>
        <option value="base">Base (lekki)</option>
      </select>

      <label for="contextInput">CONTEXT HINT</label>
      <input type="text" id="contextInput" placeholder="Nazwy, slang, kontekst...">

      <label for="analysisPrompt">ANALYSIS PROMPT</label>
      <textarea id="analysisPrompt" rows="4"
        placeholder="Domyslnie: fiszka 3x3 -- tipy, inspiracje, obserwacje."></textarea>

      <div class="settings-footer">
        <button class="btn-done" id="settingsDone">Done</button>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
